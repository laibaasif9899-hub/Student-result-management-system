<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="dashboard.css">

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>

</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>SRMS</h2>

        <a href="#"><i class="bi bi-speedometer2"></i> Dashboard</a>

        <a href="#"><i class="bi bi-people"></i> Students</a>

        <a href="#"><i class="bi bi-person-plus"></i> Add Student</a>

        <a href="#"><i class="bi bi-bar-chart"></i> Results</a>

        <a href="#"><i class="bi bi-box-arrow-right"></i> Logout</a>

    </div>

    <!-- Main Content -->

    <div class="main">

        <div class="topbar">

            <h3>Welcome Admin 👋</h3>

        </div>

        <!-- Cards -->

        <div class="row g-4 mt-2">

            <div class="col-md-3">

                <div class="card dashboard-card">

                    <i class="bi bi-people-fill"></i>

                    <h5>Total Students</h5>

                    <h2>250</h2>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card dashboard-card">

                    <i class="bi bi-check-circle-fill"></i>

                    <h5>Passed</h5>

                    <h2>220</h2>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card dashboard-card">

                    <i class="bi bi-x-circle-fill"></i>

                    <h5>Failed</h5>

                    <h2>30</h2>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card dashboard-card">

                    <i class="bi bi-file-earmark-text-fill"></i>

                    <h5>Results</h5>

                    <h2>250</h2>

                </div>

            </div>

        </div>

        <!-- Table -->

        <div class="card mt-5 p-4">

            <h4 class="mb-4">Recent Students</h4>

            <table class="table table-hover">

                <thead>

                    <tr>

                        <th>Roll No</th>

                        <th>Name</th>

                        <th>Class</th>

                        <th>Status</th>

                    </tr>

                </thead>

                <tbody>

                    <tr>

                        <td>101</td>

                        <td>Ali</td>

                        <td>BSCS</td>

                        <td><span class="badge bg-success">Pass</span></td>

                    </tr>

                    <tr>

                        <td>102</td>

                        <td>Sara</td>

                        <td>BSIT</td>

                        <td><span class="badge bg-success">Pass</span></td>

                    </tr>

                    <tr>

                        <td>103</td>

                        <td>Ahmed</td>

                        <td>BSSE</td>

                        <td><span class="badge bg-danger">Fail</span></td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
